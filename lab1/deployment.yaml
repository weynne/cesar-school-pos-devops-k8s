apiVersion: apps/v1
kind: Deployment
metadata:
  name: todolist
  namespace: todolist-grupo-05
  labels:
    app: todolist
    component: server
  annotations:
    description: "Servidor web do TodoList"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todolist
  template:
    metadata:
      labels:
        app: todolist
    spec:
      containers:
      - name: todolist
        image: andreffcastro/k8s-todolist:1.0.0
        ports:
          - containerPort: 5000
        envFrom:
          - configMapRef:
              name: todolist-config
          - secretRef:
              name: todolist-secret
        volumeMounts:
          - name: data
            mountPath: /data
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
        # --- Fora do escopo do Lab 1, mas boa prática que não deve ser
        # ignorada em ambientes reais. Descomente e ajuste conforme o app. ---
        #
        # probes: o Kubernetes usa para saber se o container está vivo e pronto.
        # (idealmente aponte para um endpoint de health, se a app tiver um)
        # livenessProbe:   # reinicia o container se ele travar
        #   httpGet:
        #     path: /
        #     port: 5000
        #   initialDelaySeconds: 5   # espera o boot antes da 1ª checagem
        #   periodSeconds: 10        # checa a cada 10s
        #   timeoutSeconds: 3        # falha se não responder em 3s (default: 1)
        #   failureThreshold: 3      # 3 falhas seguidas -> reinicia (default: 3)
        # readinessProbe:  # só envia tráfego quando a app estiver pronta
        #   httpGet:
        #     path: /
        #     port: 5000
        #   initialDelaySeconds: 5
        #   periodSeconds: 10
        #   timeoutSeconds: 3
        #   failureThreshold: 3
        #   successThreshold: 1      # só a readiness permite mudar isso (liveness/startup ficam travadas em 1)
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: todolist-pvc
