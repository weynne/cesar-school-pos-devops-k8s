apiVersion: apps/v1
kind: Deployment
metadata:
  name: todolist
  namespace: todolist-grupo-05
  labels:
    app: todolist
    component: server
  annotations:
    description: "Servidor web do TodoList V2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todolist
  template:
    metadata:
      labels:
        app: todolist
    spec:
      serviceAccountName: todolist-serviceaccount
      containers:
      - name: todolist
        image: andreffcastro/k8s-todolist:1.1.0
        ports:
          - containerPort: 5000
        envFrom:
          - configMapRef:
              name: todolist-config
          - secretRef:
              name: todolist-secret
        volumeMounts:
          - name: data
            mountPath: /data
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: todolist-pvc
